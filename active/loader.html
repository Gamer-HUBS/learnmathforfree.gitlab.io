<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #020617;
      color: #e2e8f0;
      font: 16px/1.4 system-ui, sans-serif;
    }
    #status { opacity: 0.85; }
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  <script>
(async function loadScramjetAndProxy() {
  const scripts = [
    "/scramjet/scramjet.codecs.js",
    "/scramjet/scramjet.config.js",
    "/scramjet/scramjet.bundle.js",
    "/vendor/bare-mux-v1/bare.js",
    "/vendor/epoxy/index.js"
  ];

  try {
    for (const url of scripts) {
      console.log("[loader] Fetching", url);
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Failed to fetch ${url}: ${res.status}`);
      const code = await res.text();
      (0, eval)(code);
      console.log("[loader] Loaded", url, code.length, "bytes");
    }

    const { ensureProxyReady } = await import("/active/scripts/prxy.mjs");
    await ensureProxyReady();

    console.log("[loader] Scramjet + proxy initialized successfully.");
  } catch (err) {
    console.error("[loader] Failed to initialize proxy:", err);
    document.getElementById("status").textContent = "Proxy initialization failed. Check console.";
  }
})();
</script>
</body>
</html>
